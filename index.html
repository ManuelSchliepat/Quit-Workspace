<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Men's Daily HQ</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">

    <!-- Header -->
    <header id="header">
      <div class="header-left">
        <h1 class="logo">Men's Daily HQ</h1>
        <p class="greeting" id="greeting"></p>
      </div>
      <div class="header-right">
        <span class="date" id="date-display"></span>
      </div>
    </header>

    <!-- Main -->
    <main id="main">

      <!-- Category Grid -->
      <section id="category-section">
        <div class="section-label-row">
          <h2 class="section-heading">Your Categories</h2>
          <span class="section-sub">Click any category for today's briefing</span>
        </div>
        <div id="category-grid"></div>
      </section>

      <!-- Briefing Panel -->
      <section id="briefing-panel" class="hidden">
        <div class="briefing-header">
          <span class="briefing-icon" id="briefing-icon"></span>
          <div class="briefing-header-text">
            <h2 id="briefing-title"></h2>
            <p class="briefing-date" id="briefing-date"></p>
          </div>
          <div class="briefing-actions">
            <button class="btn-icon" id="open-settings" title="Configure briefing format">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/>
                <path d="M12 2v2M12 20v2M2 12h2M20 12h2"/>
              </svg>
              Settings
            </button>
            <button class="btn-icon btn-close" id="close-briefing" title="Close">✕</button>
          </div>
        </div>

        <div class="briefing-body" id="briefing-body"></div>

        <div class="briefing-footer" id="tone-bar"></div>
      </section>

    </main>
  </div>

  <!-- Settings Modal -->
  <div id="settings-overlay" class="hidden">
    <div id="settings-modal">
      <div class="modal-header">
        <div>
          <h2>Briefing Settings</h2>
          <p class="modal-subtitle" id="settings-category-name"></p>
        </div>
        <button class="btn-icon btn-close" id="close-settings">✕</button>
      </div>

      <div class="modal-body">
        <div class="settings-group">
          <label class="settings-group-label">Sections to show</label>
          <p class="settings-group-hint">Toggle which sections appear in your daily briefing</p>
          <div id="settings-sections"></div>
        </div>

        <div class="settings-row">
          <div class="settings-group">
            <label class="settings-group-label" for="settings-tone">Tone</label>
            <select id="settings-tone">
              <option value="motivational">Motivational</option>
              <option value="professional">Professional</option>
              <option value="casual">Casual</option>
              <option value="intense">Intense</option>
            </select>
          </div>
          <div class="settings-group">
            <label class="settings-group-label" for="settings-length">Briefing length</label>
            <select id="settings-length">
              <option value="brief">Brief</option>
              <option value="medium">Medium</option>
              <option value="detailed">Detailed</option>
            </select>
          </div>
        </div>
      </div>

      <div class="modal-footer">
        <button class="btn-secondary" id="settings-cancel">Cancel</button>
        <button class="btn-primary" id="settings-save">Save &amp; Refresh</button>
      </div>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
